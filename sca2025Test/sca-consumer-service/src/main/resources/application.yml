server:
  port: 8082
spring:
  application:
    name: consumer-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        # Nacos 3.x 默认使用 gRPC 端口（9848），无需额外配置
        # 开启自动注册，缺省容易报错
        username: nacos   # 检查这里
        password: nacos    # 检查这里
      config:
        server-addr: 127.0.0.1:8848   # Nacos 服务端地址
        username: nacos   # 检查这里
        password: nacos    # 检查这里
        file-extension: yaml          # 配置文件格式（必须与 Nacos 中创建的一致）
        refresh-enabled: true
    sentinel:
     transport:
       dashboard: localhost:8858  # 指向你刚启动的 Sentinel 控制台
       # port: 8719               # 默认8719，如被占用可修改
       eager: true                  # 建议开启，让应用启动时立即连接控制台
  config:
    import:
      - optional:nacos:consumer-service.yaml?group=DEFAULT_GROUP&refresh=true
  datasource:
    url: jdbc:mysql://localhost:3306/account?characterEncoding=UTF-8&useSSL=false&useUnicode=true&serverTimezone=UTC
    username: root
    password: 123@$abc
    driver-class-name: com.mysql.cj.jdbc.Driver
management:
  tracing:
      sampling:
        probability: 1.0 # 采样率，1.0 表示 100% 采样，生产环境建议调低，如 0.1
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans # 你的 Zipkin 服务器地址
seata:
  tx-service-group: default_tx_group    # 事务分组，与 Seata Server 配置保持一致
  service:
    vgroup-mapping:
      default_tx_group: default  # key 为 tx-service-group 的值
  config:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
      data-id: seata.properties  #默认这个名字 和nacos上的对应
      username: nacos
      password: nacos
  registry:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      namespace: public
      group: SEATA_GROUP
      username: nacos
      password: nacos
mybatis:
  #所有pojo类所在包的路径
  type-aliases-package: com.wittycat.components.sca.consumer.entity
  # xml映射文件所在的路径，一般用模糊匹配来指定最终的xml文件
  mapper-locations: classpath:mapper/*.xml #mapper映射文件
  configuration:
    #采用驼峰形式将数据表中以‘_’分隔的字段映射到java类的某个属性,比如表字段user_name可以映射为类里面的userName属性
    map-underscore-to-camel-case: true #支持驼峰映射